<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="아기기록">
<meta name="theme-color" content="#5B7BFF">
<title>아기 기록</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --sleep:#7B6CF6;--sleep-bg:#F0EEFF;
  --formula:#F5A623;--formula-bg:#FFF8EC;
  --breast:#E8667A;--breast-bg:#FFF0F2;
  --diaper:#3DBAA2;--diaper-bg:#EDFAF7;
  --growth:#34C759;--growth-bg:#E8F8ED;
  --hospital:#FF6B6B;--hospital-bg:#FFF0F0;
  --primary:#5B7BFF;--primary-bg:#EEF1FF;
  --bg:#F4F5FA;--card:#fff;
  --txt:#1A1D2E;--txt2:#6B7280;--txt3:#B0B7C3;
  --border:#E8EAF0;--r:16px;--rs:10px;
}
body.dark{
  --bg:#0F1117;--card:#1C1F2E;--txt:#F0F2FF;--txt2:#9BA3B8;--txt3:#4A5268;
  --border:#2A2D3E;--primary-bg:#1A1F3A;
  --sleep-bg:#1E1A3A;--formula-bg:#2A1F0A;--breast-bg:#2A141A;--diaper-bg:#0A2220;
  --growth-bg:#0A2010;--hospital-bg:#2A0A0A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button{touch-action:manipulation;user-select:none;-webkit-user-select:none}
input,select,textarea{touch-action:manipulation}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);max-width:430px;margin:0 auto;min-height:100vh;padding-top:env(safe-area-inset-top);}
.fab-bar{padding-bottom:env(safe-area-inset-bottom);}

.hd{background:var(--primary);padding:14px 16px 0;color:#fff}
.hd-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
.hd-title{font-size:20px;font-weight:900;letter-spacing:-.5px}
.hd-sub{font-size:12px;opacity:.75;margin-top:1px}
.hd-actions{display:flex;gap:8px}
.hd-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px}
.sync-bar{background:rgba(0,0,0,.15);padding:4px 16px;font-size:11px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:6px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.sync-dot.off{background:#FCA5A5}.sync-dot.loading{background:#FCD34D;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:11px 14px;font-size:12px;font-weight:500;color:var(--txt2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;white-space:nowrap}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}

.quick-row{display:flex;gap:6px;overflow-x:auto;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);scrollbar-width:none}
.quick-row::-webkit-scrollbar{display:none}
.qb{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.qb-icon{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;transition:transform .1s}
.qb:active .qb-icon{transform:scale(.9)}
.qb-icon.sleep{background:var(--sleep-bg)}.qb-icon.formula{background:var(--formula-bg)}
.qb-icon.breast{background:var(--breast-bg)}.qb-icon.diaper{background:var(--diaper-bg)}
.qb-icon.growth{background:var(--growth-bg)}.qb-icon.hospital{background:var(--hospital-bg)}
.qb-name{font-size:11px;color:var(--txt2);font-weight:500}

.warn-banner{margin:8px 16px;border-radius:var(--rs);padding:10px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.warn-banner.feed{background:#FFF3E0;color:#E65100}
.warn-banner.hidden{display:none}
.predict-bar{background:var(--primary-bg);border-left:3px solid var(--primary);border-radius:0 var(--rs) var(--rs) 0;margin:0 16px 8px;padding:10px 14px;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.predict-bar.hidden{display:none}
.predict-label{color:var(--txt2);font-size:11px}.predict-val{font-weight:700;color:var(--primary);font-size:15px}

.last-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.lc{background:var(--primary-bg);border-radius:12px;padding:9px 10px;cursor:pointer}
.lc:active{background:#dde4ff}
.lc-label{font-size:10px;color:var(--primary);font-weight:600;margin-bottom:3px}
.lc-time{font-size:14px;font-weight:700;line-height:1.2}
.lc-detail{font-size:10px;color:var(--txt2);margin-top:2px}

.date-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border)}
.dnbtn{background:none;border:none;font-size:22px;color:var(--txt2);cursor:pointer;padding:2px 10px}
.date-main{font-size:15px;font-weight:700;text-align:center}
.date-age{font-size:11px;color:var(--txt2);margin-top:1px;text-align:center}

.chips{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;position:relative;overflow:hidden}
.chip.sleep{background:var(--sleep-bg);color:var(--sleep)}.chip.formula{background:var(--formula-bg);color:#B87E0E}
.chip.breast{background:var(--breast-bg);color:var(--breast)}.chip.diaper{background:var(--diaper-bg);color:var(--diaper)}
.chip.goal{background:#E8F5E9;color:#2E7D32}
body.dark .chip.goal{background:#0A2010;color:#81C784}
.goal-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 20px 20px;background:#4CAF50}

.log-list{padding:12px 16px 140px}
.log-card{background:var(--card);border-radius:var(--r);padding:13px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.li-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.li-icon.sleep{background:var(--sleep-bg)}.li-icon.formula{background:var(--formula-bg)}
.li-icon.breast{background:var(--breast-bg)}.li-icon.diaper{background:var(--diaper-bg)}
.li-icon.growth{background:var(--growth-bg)}.li-icon.hospital{background:var(--hospital-bg)}
.li-body{flex:1;min-width:0}
.li-type{font-size:14px;font-weight:700}
.li-type.sleep{color:var(--sleep)}.li-type.formula{color:var(--formula)}
.li-type.breast{color:var(--breast)}.li-type.diaper{color:var(--diaper)}
.li-type.growth{color:var(--growth)}.li-type.hospital{color:var(--hospital)}
.li-detail{font-size:13px;color:var(--txt2);margin-top:3px}
.li-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.li-time{font-size:14px;font-weight:600}
.li-end{font-size:11px;color:var(--txt3)}
.del-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;padding:0 0 0 6px;line-height:1}
.sleep-timer{font-size:11px;color:var(--sleep);font-weight:700;margin-top:2px}
.memo-text{font-size:11px;color:var(--txt3);margin-top:3px;font-style:italic}
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-e{font-size:44px;margin-bottom:12px}

.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:500;font-size:14px;color:var(--txt2)}
.loading-overlay.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.fab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);padding:12px 16px 36px;display:flex;gap:8px;z-index:100}
.fab-mic{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:26px 14px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:20px;font-weight:700;cursor:pointer;font-family:inherit}
.fab-mic.on{background:#E8667A;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}

.voice-overlay{position:fixed;inset:0;background:rgba(10,10,30,.88);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.voice-overlay.hidden{display:none}
.voice-ring{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:44px;animation:ring 1.2s ease-in-out infinite}
@keyframes ring{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,255,255,.3)}50%{transform:scale(1.08);box-shadow:0 0 0 20px rgba(255,255,255,0)}}
.voice-tip{color:rgba(255,255,255,.9);font-size:14px;font-weight:500}
.voice-hint{color:rgba(255,255,255,.5);font-size:12px;text-align:center;line-height:1.8}
.voice-cancel{padding:10px 28px;background:rgba(255,255,255,.15);border:none;border-radius:20px;color:#fff;font-size:14px;cursor:pointer;font-family:inherit}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.overlay.hidden{display:none}
.sheet{background:var(--card);border-radius:24px 24px 0 0;padding:8px 16px 40px;width:100%;max-height:92vh;overflow-y:auto}
.drag-bar{width:36px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 14px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:14px;text-align:center}

.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(26,29,46,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.success{background:#10B981 !important;}
.toast.error{background:#EF4444 !important;}

/* 나머지 스타일 (type-grid, fg, modal 등) */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.type-tile{border:2px solid var(--border);border-radius:var(--rs);padding:11px 4px;text-align:center;cursor:pointer;background:var(--card);font-family:inherit}
.type-tile .em{font-size:22px;display:block;margin-bottom:4px}
.type-tile .nm{font-size:11px;color:var(--txt2);font-weight:500}
.type-tile.sel.sleep{border-color:var(--sleep);background:var(--sleep-bg)}
.type-tile.sel.formula{border-color:var(--formula);background:var(--formula-bg)}
.type-tile.sel.breast{border-color:var(--breast);background:var(--breast-bg)}
.type-tile.sel.diaper{border-color:var(--diaper);background:var(--diaper-bg)}
.type-tile.sel.growth{border-color:var(--growth);background:var(--growth-bg)}
.type-tile.sel.hospital{border-color:var(--hospital);background:var(--hospital-bg)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:15px;font-family:inherit;color:var(--txt);background:var(--card);outline:none;height:48px}
.fg textarea{height:72px;padding:12px;resize:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:flex;border-radius:var(--rs);overflow:hidden;border:1.5px solid var(--border)}
.seg button{flex:1;padding:10px 4px;background:var(--card);border:none;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;font-weight:500}
.seg button.sel{background:var(--primary);color:#fff}
.save-btn{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.cancel-btn{width:100%;padding:10px;background:none;border:none;color:var(--txt2);font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}
</style>
</head>
<body>
<div class="loading-overlay" id="loading"><div class="spinner"></div><div>불러오는 중...</div></div>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="hd">
  <div class="hd-top">
    <div>
      <div class="hd-title" id="hd-title">👶 아기 기록</div>
      <div class="hd-sub" id="hd-sub">오늘</div>
    </div>
    <div class="hd-actions">
      <button class="hd-btn" onclick="openCal()">📅</button>
      <button class="hd-btn" onclick="exportCSV()">⬇️</button>
      <button class="hd-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <div class="sync-bar"><div class="sync-dot" id="sync-dot"></div><span id="sync-txt">연결 중...</span></div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-home" onclick="switchTab('home')">📋 기록</button>
  <button class="tab-btn" id="tab-stats" onclick="switchTab('stats')">📊 통계</button>
  <button class="tab-btn" id="tab-growth" onclick="switchTab('growth')">📏 성장</button>
  <button class="tab-btn" id="tab-hospital" onclick="switchTab('hospital')">🏥 병원</button>
</div>

<!-- HOME PAGE -->
<div class="page show" id="page-home">
  <div class="quick-row">
    <div class="qb" onclick="quickAdd('sleep')"><div class="qb-icon sleep">😴</div><div class="qb-name">수면</div></div>
    <div class="qb" onclick="openModal({type:'formula'})"><div class="qb-icon formula">🍼</div><div class="qb-name">분유</div></div>
    <div class="qb" onclick="openModal({type:'breast'})"><div class="qb-icon breast">🤱</div><div class="qb-name">모유</div></div>
    <div class="qb" onclick="quickAdd('diaper','urine')"><div class="qb-icon diaper">💧</div><div class="qb-name">소변</div></div>
    <div class="qb" onclick="quickAdd('diaper','stool')"><div class="qb-icon diaper">💩</div><div class="qb-name">대변</div></div>
    <div class="qb" onclick="quickAdd('diaper','both')"><div class="qb-icon diaper">🔄</div><div class="qb-name">둘다</div></div>
  </div>
  <div class="last-bar" id="last-bar"></div>
  <div class="warn-banner feed hidden" id="warn-feed">⚠️ <span id="warn-feed-txt"></span></div>
  <div class="predict-bar hidden" id="predict-bar">
    <div><div class="predict-label">다음 수유 예상</div><div class="predict-val" id="predict-val">--:--</div></div>
    <div style="font-size:11px;color:var(--txt2)" id="predict-in"></div>
  </div>

  <!-- 현재 수면 중 바 -->
  <div class="predict-bar" id="ongoing-sleep-bar" style="background:var(--sleep-bg);border-left-color:var(--sleep);display:none">
    <div><div class="predict-label">😴 현재 수면 중</div><div class="predict-val" id="ongoing-time">0분</div></div>
    <button onclick="endCurrentSleep()" style="background:none;border:none;font-size:22px;padding:0 8px">⏹</button>
  </div>

  <div class="date-nav">
    <button class="dnbtn" onclick="shiftDay(-1)">‹</button>
    <div><div class="date-main" id="date-main"></div><div class="date-age" id="date-age"></div></div>
    <button class="dnbtn" onclick="shiftDay(1)">›</button>
  </div>
  <div class="chips" id="chips"></div>
  <div class="log-list" id="log-list"></div>
</div>

<!-- STATS, GROWTH, HOSPITAL 페이지 (기존 코드 유지) -->
<div class="page" id="page-stats"> ... (기존 stats 내용) ...</div>
<div class="page" id="page-growth"> ... (기존 growth 내용) ...</div>
<div class="page" id="page-hospital"> ... (기존 hospital 내용) ...</div>

<!-- FAB, Voice, Modal, Calendar, Settings 등은 기존 그대로 -->
<!-- (전체 길이 때문에 생략했으나, 원본 파일의 해당 부분을 그대로 복사해서 사용하세요) -->

<script>
// ── SUPABASE ──
const SUPA_URL='https://yaxrymvpbvcpxbfqvzen.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheHJ5bXZwYnZjcHhiZnF2emVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTM4MDUsImV4cCI6MjA5Mzk2OTgwNX0.f6ESGyRoclBzK_O8lptqP6ZOjFQwj_8tQJ9bEcuxOOQ';
const H={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

async function apiGet(p){ const r=await fetch(SUPA_URL+'/rest/v1/'+p,{headers:{...H,'Prefer':'return=representation'}}); if(!r.ok) throw new Error(await r.text()); return r.json(); }
async function apiPost(d){ const r=await fetch(SUPA_URL+'/rest/v1/baby_logs',{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(d)}); if(!r.ok) throw new Error(await r.text()); return r.json(); }
async function apiPatch(id,d){ const r=await fetch(SUPA_URL+'/rest/v1/baby_logs?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(d)}); if(!r.ok) throw new Error(await r.text()); return r.json(); }
async function apiDelete(id){ const r=await fetch(SUPA_URL+'/rest/v1/baby_logs?id=eq.'+id,{method:'DELETE',headers:H}); if(!r.ok) throw new Error(await r.text()); }

// ── STATE ──
let records=[], selDate=new Date(), calDate=new Date();
let modalType='sleep', leftMin=0, rightMin=0, _sk='nap', _dk='urine';
let isListening=false, recog=null;
let statsPeriod='day', statsOffset=0;
let currentTab='home';
let settings={};
let sleepTimerInterval=null;

// ── HELPERS (기존 그대로) ──
const pad=n=>String(n).padStart(2,'0');
const fmtDate=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const fmtTime=iso=>{const d=new Date(iso);return pad(d.getHours())+':'+pad(d.getMinutes());};
const nowTime=()=>{const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());};
const todayStr=()=>fmtDate(new Date());
function elapsed(iso){const m=Math.floor((Date.now()-new Date(iso))/60000);if(m<1)return '방금 전';if(m<60)return m+'분 전';const h=Math.floor(m/60),rm=m%60;return h+'시간'+(rm?' '+rm+'분':'')+'전';}
function durMin(s,e){return Math.round((new Date(e)-new Date(s))/60000);}
function durLabel(m){return m<60?m+'분':Math.floor(m/60)+'시간'+(m%60?' '+m%60+'분':'');}
function autoSleepKind(d){const h=new Date(d).getHours();return(h>=6&&h<19)?'nap':'night';}

const EMOJI={sleep:'😴',formula:'🍼',breast:'🤱',diaper:'💧',growth:'📏',hospital:'🏥'};
const LABEL={sleep:'수면',formula:'분유',breast:'모유',diaper:'기저귀',growth:'성장',hospital:'병원'};

function detail(r){
  if(r.type==='sleep'){const tag=r.sleep_kind==='nap'?'낮잠':'밤잠';if(r.end_time)return tag+' · '+durLabel(durMin(r.start_time,r.end_time));return tag+' · 진행 중 ⏱';}
  if(r.type==='formula')return(r.ml||0)+'ml';
  if(r.type==='breast'){const p=[];if(r.left_min)p.push('왼쪽 '+r.left_min+'분');if(r.right_min)p.push('오른쪽 '+r.right_min+'분');const t=(r.left_min||0)+(r.right_min||0);if(t)p.push('총 '+t+'분');return p.join(' · ')||'모유';}
  if(r.type==='diaper')return {urine:'소변',stool:'대변',both:'소변+대변'}[r.diaper_kind]||'기저귀';
  if(r.type==='growth'){const p=[];if(r.weight)p.push(r.weight+'kg');if(r.height)p.push(r.height+'cm');if(r.head)p.push('두위 '+r.head+'cm');return p.join(' · ')||'성장 기록';}
  if(r.type==='hospital')return r.hospital_name||(r.memo||'병원 방문');
  return '';
}

// ── SETTINGS, PUSH, VOICE 등 기존 함수들 (생략 없이 모두 포함해야 함) ──
// ... (당신의 원본 shakefix.html에 있는 loadSettings ~ handleVoice까지 모두 복사해서 붙여넣으세요) ...

// ── 개선된 부분 ──
function showToast(msg, type='default'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  if(type==='success') el.style.background='#10B981';
  else if(type==='error') el.style.background='#EF4444';
  else el.style.background='rgba(26,29,46,.9)';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2800);
}

async function delRec(id){
  if(!confirm('정말로 이 기록을 삭제할까요?\n\n이 작업은 되돌릴 수 없습니다.')) return;
  const r = records.find(x => x.id === id);
  const typeName = r ? LABEL[r.type] : '기록';
  try{
    await apiDelete(id);
    records = records.filter(r=>r.id!==id);
    render();
    showToast(`🗑 ${typeName} 기록이 삭제되었습니다`, 'success');
  }catch(e){
    showToast('삭제 실패', 'error');
  }
}

function renderOngoingSleep(){
  const ongoing = records.find(r=>r.type==='sleep' && !r.end_time);
  const bar = document.getElementById('ongoing-sleep-bar');
  if(!ongoing){ bar.style.display='none'; return; }
  bar.style.display='flex';
  const el = document.getElementById('ongoing-time');
  const update = () => {
    const m = Math.floor((Date.now() - new Date(ongoing.start_time))/60000);
    el.textContent = durLabel(m);
  };
  update();
}

function endCurrentSleep(){
  quickAdd('sleep');
}

function render(){
  renderHeader();
  renderLastBar();
  renderWarnings();
  renderDateNav();
  renderChips();
  renderLogs();
  startSleepTimer();
  renderOngoingSleep();   // 현재 수면 중 바
  if(currentTab==='stats') renderStats();
  if(currentTab==='growth') renderGrowth();
  if(currentTab==='hospital') renderHospital();
}

// saveRec에서도 성공 toast 적용 예시
async function saveRec(){
  // ... 기존 saveRec 로직 ...
  closeModal();
  try{
    await apiPost(rec);
    showToast(EMOJI[modalType]+' 저장되었습니다', 'success');
    await loadAll();
    if(modalType==='growth') renderGrowth();
    if(modalType==='hospital') renderHospital();
  }catch(e){showToast('저장 실패', 'error');}
}

// ── INIT ──
loadSettings();
loadAll().then(()=>{initRealtime();});

</script>
