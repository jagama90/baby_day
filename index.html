<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="아기기록">
<title>아기 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --sleep:#7B6CF6;--sleep-bg:#F0EEFF;
  --formula:#F5A623;--formula-bg:#FFF8EC;
  --breast:#E8667A;--breast-bg:#FFF0F2;
  --diaper:#3DBAA2;--diaper-bg:#EDFAF7;
  --primary:#5B7BFF;--primary-bg:#EEF1FF;
  --bg:#F4F5FA;--card:#fff;
  --txt:#1A1D2E;--txt2:#6B7280;--txt3:#B0B7C3;
  --border:#E8EAF0;
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button{touch-action:manipulation;user-select:none;-webkit-user-select:none}
input,select{touch-action:manipulation}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);max-width:430px;margin:0 auto;min-height:100vh}

/* HEADER */
.hd{background:var(--primary);padding:14px 16px 0;color:#fff}
.hd-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
.hd-title{font-size:20px;font-weight:900;letter-spacing:-0.5px}
.hd-sub{font-size:12px;opacity:.75;margin-top:1px}
.hd-actions{display:flex;gap:8px}
.hd-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px}

/* SYNC STATUS */
.sync-bar{background:rgba(0,0,0,.15);padding:4px 16px;font-size:11px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:6px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.sync-dot.off{background:#FCA5A5}
.sync-dot.loading{background:#FCD34D;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* QUICK BUTTONS - 상단 배치 */
.quick-row{display:flex;gap:6px;overflow-x:auto;padding:12px 16px;background:#fff;border-bottom:1px solid var(--border);scrollbar-width:none}
.quick-row::-webkit-scrollbar{display:none}
.qb{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.qb-icon{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;transition:transform .1s;position:relative}
.qb:active .qb-icon{transform:scale(.9)}
.qb-icon.sleep{background:var(--sleep-bg)}
.qb-icon.formula{background:var(--formula-bg)}
.qb-icon.breast{background:var(--breast-bg)}
.qb-icon.diaper{background:var(--diaper-bg)}
.qb-name{font-size:11px;color:var(--txt2);font-weight:500}

/* LAST ACTIVITY - 퀵버튼 아래 배치 */
.last-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border)}
.lc{background:var(--primary-bg);border-radius:12px;padding:9px 10px;cursor:pointer;transition:background .1s}
.lc:active{background:#dde4ff}
.lc-label{font-size:10px;color:var(--primary);font-weight:600;margin-bottom:3px}
.lc-time{font-size:14px;font-weight:700;color:var(--txt);line-height:1.2}
.lc-detail{font-size:10px;color:var(--txt2);margin-top:2px}

/* DATE NAV */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#fff;border-bottom:1px solid var(--border)}
.dnbtn{background:none;border:none;font-size:22px;color:var(--txt2);cursor:pointer;padding:2px 10px}
.date-center{text-align:center}
.date-main{font-size:15px;font-weight:700}
.date-age{font-size:11px;color:var(--txt2);margin-top:1px}

/* CHIPS */
.chips{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500}
.chip.sleep{background:var(--sleep-bg);color:var(--sleep)}
.chip.formula{background:var(--formula-bg);color:#B87E0E}
.chip.breast{background:var(--breast-bg);color:var(--breast)}
.chip.diaper{background:var(--diaper-bg);color:var(--diaper)}

/* LOG LIST */
.log-list{padding:12px 16px 140px}
.log-card{background:var(--card);border-radius:var(--r);padding:13px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.li-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.li-icon.sleep{background:var(--sleep-bg)}
.li-icon.formula{background:var(--formula-bg)}
.li-icon.breast{background:var(--breast-bg)}
.li-icon.diaper{background:var(--diaper-bg)}
.li-body{flex:1;min-width:0}
.li-type{font-size:14px;font-weight:700}
.li-type.sleep{color:var(--sleep)}
.li-type.formula{color:var(--formula)}
.li-type.breast{color:var(--breast)}
.li-type.diaper{color:var(--diaper)}
.li-detail{font-size:13px;color:var(--txt2);margin-top:3px}
.li-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.li-time{font-size:14px;font-weight:600}
.li-end{font-size:11px;color:var(--txt3)}
.del-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:20px;padding:0 0 0 8px;line-height:1}
.empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-e{font-size:44px;margin-bottom:12px}
.empty-t{font-size:14px}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:500;font-size:14px;color:var(--txt2)}
.loading-overlay.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM FAB */
.fab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);padding:12px 16px 36px;display:flex;gap:8px;z-index:100}
.fab-mic{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:26px 14px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
.fab-mic.on{background:#E8667A;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.75}}

/* VOICE OVERLAY */
.voice-overlay{position:fixed;inset:0;background:rgba(10,10,30,.88);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.voice-overlay.hidden{display:none}
.voice-ring{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:44px;animation:ring 1.2s ease-in-out infinite}
@keyframes ring{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,255,255,.3)}50%{transform:scale(1.08);box-shadow:0 0 0 20px rgba(255,255,255,0)}}
.voice-tip{color:rgba(255,255,255,.9);font-size:14px;text-align:center;font-weight:500}
.voice-hint{color:rgba(255,255,255,.5);font-size:12px;text-align:center;line-height:1.8}
.voice-cancel{padding:10px 28px;background:rgba(255,255,255,.15);border:none;border-radius:20px;color:#fff;font-size:14px;cursor:pointer;font-family:inherit}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.overlay.hidden{display:none}
.sheet{background:#fff;border-radius:24px 24px 0 0;padding:8px 16px 40px;width:100%;max-height:92vh;overflow-y:auto}
.drag-bar{width:36px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 14px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:14px;text-align:center}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.type-tile{border:2px solid var(--border);border-radius:var(--rs);padding:11px 4px;text-align:center;cursor:pointer;background:#fff;font-family:inherit;transition:all .15s}
.type-tile .em{font-size:22px;display:block;margin-bottom:4px}
.type-tile .nm{font-size:11px;color:var(--txt2);font-weight:500}
.type-tile.sel.sleep{border-color:var(--sleep);background:var(--sleep-bg)}
.type-tile.sel.formula{border-color:var(--formula);background:var(--formula-bg)}
.type-tile.sel.breast{border-color:var(--breast);background:var(--breast-bg)}
.type-tile.sel.diaper{border-color:var(--diaper);background:var(--diaper-bg)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.fg input,.fg select{width:100%;padding:0 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:15px;font-family:inherit;color:var(--txt);background:#fff;outline:none;height:48px;appearance:none;-webkit-appearance:none;display:flex;align-items:center}
.fg input:focus,.fg select:focus{border-color:var(--primary)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:flex;border-radius:var(--rs);overflow:hidden;border:1.5px solid var(--border)}
.seg button{flex:1;padding:10px 4px;background:#fff;border:none;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;font-weight:500;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.seg button.sel{background:var(--primary);color:#fff}
.breast-box{background:var(--breast-bg);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.bt-label{font-size:12px;color:var(--breast);font-weight:700;margin-bottom:8px}
.bt-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bt-side{background:#fff;border-radius:8px;padding:10px;text-align:center}
.bt-side-name{font-size:11px;color:var(--txt2);margin-bottom:6px;font-weight:500}
.bt-side-val{font-size:22px;font-weight:700;color:var(--breast)}
.bt-btns{display:flex;gap:4px;justify-content:center;margin-top:6px}
.bt-btns button{width:36px;height:36px;border-radius:50%;border:none;background:var(--breast-bg);color:var(--breast);font-size:20px;cursor:pointer;font-family:inherit;font-weight:700;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.save-btn{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.cancel-btn{width:100%;padding:10px;background:none;border:none;color:var(--txt2);font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}

/* CALENDAR */
.cal-sheet{background:#fff;border-radius:24px 24px 0 0;padding:8px 16px 32px;width:100%;max-height:80vh;overflow-y:auto}
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.cal-head span{font-size:16px;font-weight:700}
.cal-head button{background:none;border:none;font-size:22px;color:var(--txt2);cursor:pointer;padding:4px 10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:2px}
.cal-dn{font-size:11px;color:var(--txt3);padding:4px 0}
.cal-d{font-size:14px;cursor:pointer;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative}
.cal-d:hover{background:var(--bg)}
.cal-d.today{background:var(--primary);color:#fff}
.cal-d.sel{background:var(--primary-bg);color:var(--primary);font-weight:700}
.cal-d.has::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--diaper)}
.cal-d.empty{cursor:default}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(26,29,46,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div>불러오는 중...</div>
</div>

<div class="toast" id="toast"></div>

<div class="hd">
  <div class="hd-top">
    <div>
      <div class="hd-title">👶 아기 기록</div>
      <div class="hd-sub" id="hd-sub">오늘</div>
    </div>
    <div class="hd-actions">
      <button class="hd-btn" onclick="openCal()">📅</button>
      <button class="hd-btn" onclick="exportCSV()">⬇️</button>
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-txt">연결 중...</span>
  </div>
</div>

<!-- 퀵버튼 (상단) -->
<div class="quick-row">
  <div class="qb" onclick="quickAdd('sleep')"><div class="qb-icon sleep">😴</div><div class="qb-name">수면</div></div>
  <div class="qb" onclick="openModal({type:'formula'})"><div class="qb-icon formula">🍼</div><div class="qb-name">분유</div></div>
  <div class="qb" onclick="openModal({type:'breast'})"><div class="qb-icon breast">🤱</div><div class="qb-name">모유</div></div>
  <div class="qb" onclick="quickAdd('diaper','urine')"><div class="qb-icon diaper">💧</div><div class="qb-name">소변</div></div>
  <div class="qb" onclick="quickAdd('diaper','stool')"><div class="qb-icon diaper">💩</div><div class="qb-name">대변</div></div>
  <div class="qb" onclick="quickAdd('diaper','both')"><div class="qb-icon diaper">🔄</div><div class="qb-name">둘다</div></div>
</div>

<!-- 마지막 기록 배너 (퀵버튼 아래) -->
<div class="last-bar" id="last-bar"></div>

<div class="date-nav">
  <button class="dnbtn" onclick="shiftDay(-1)">‹</button>
  <div class="date-center">
    <div class="date-main" id="date-main"></div>
    <div class="date-age" id="date-age"></div>
  </div>
  <button class="dnbtn" onclick="shiftDay(1)">›</button>
</div>

<div class="chips" id="chips"></div>
<div class="log-list" id="log-list"></div>

<div class="fab-bar">
  <button class="fab-mic" id="mic-btn" onclick="toggleMic()">🎙 음성 입력</button>
</div>

<!-- Voice -->
<div class="voice-overlay hidden" id="voice-overlay">
  <div class="voice-ring">🎙</div>
  <div class="voice-tip" id="voice-tip">말씀해주세요</div>
  <div class="voice-hint">
    "분유 120" · "모유 왼쪽 8분 오른쪽 5분"<br>
    "기저귀 대변" · "수면 끝" · "방금 입력한거 삭제"
  </div>
  <button class="voice-cancel" onclick="stopMic()">취소</button>
</div>

<!-- Add Modal -->
<div class="overlay hidden" id="modal">
  <div class="sheet">
    <div class="drag-bar"></div>
    <div class="sheet-title">기록 추가</div>
    <div class="type-grid">
      <button class="type-tile sel sleep" id="tt-sleep" onclick="selType('sleep')"><span class="em">😴</span><span class="nm">수면</span></button>
      <button class="type-tile formula" id="tt-formula" onclick="selType('formula')"><span class="em">🍼</span><span class="nm">분유</span></button>
      <button class="type-tile breast" id="tt-breast" onclick="selType('breast')"><span class="em">🤱</span><span class="nm">모유</span></button>
      <button class="type-tile diaper" id="tt-diaper" onclick="selType('diaper')"><span class="em">💧</span><span class="nm">기저귀</span></button>
    </div>
    <div id="modal-fields"></div>
    <button class="save-btn" onclick="saveRec()">저장</button>
    <button class="cancel-btn" onclick="closeModal()">취소</button>
  </div>
</div>

<!-- Calendar Modal -->
<div class="overlay hidden" id="cal-modal">
  <div class="cal-sheet">
    <div class="drag-bar"></div>
    <div class="cal-head">
      <button onclick="calShift(-1)">‹</button>
      <span id="cal-label"></span>
      <button onclick="calShift(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <button class="cancel-btn" onclick="closeCal()">닫기</button>
  </div>
</div>

<script>
// ── SUPABASE CONFIG ──
const SUPA_URL = 'https://yaxrymvpbvcpxbfqvzen.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlheHJ5bXZwYnZjcHhiZnF2emVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTM4MDUsImV4cCI6MjA5Mzk2OTgwNX0.f6ESGyRoclBzK_O8lptqP6ZOjFQwj_8tQJ9bEcuxOOQ';
const HEADERS = {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

// ── STATE ──
let records = [];
let selDate = new Date();
let calDate = new Date();
let modalType = 'sleep';
let leftMin = 0, rightMin = 0;
let _sk = 'nap', _dk = 'urine';
let isListening = false, recog = null;
let realtimeChannel = null;

// ── HELPERS ──
function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtTime(iso){ const d=new Date(iso); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function nowTime(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function todayStr(){ return fmtDate(new Date()); }
function elapsed(iso){
  const m=Math.floor((Date.now()-new Date(iso))/60000);
  if(m<1) return '방금 전';
  if(m<60) return m+'분 전';
  const h=Math.floor(m/60),rm=m%60;
  return h+'시간'+(rm?' '+rm+'분':'')+'전';
}
function durMin(s,e){ return Math.round((new Date(e)-new Date(s))/60000); }
function durLabel(m){ return m<60?m+'분':Math.floor(m/60)+'시간'+(m%60?' '+m%60+'분':''); }

// 시간 → 낮잠/밤잠 자동 판단 (06:00~19:00 = 낮잠, 나머지 = 밤잠)
function autoSleepKind(isoOrTime){
  const d = new Date(isoOrTime);
  const h = d.getHours();
  return (h>=6 && h<19) ? 'nap' : 'night';
}

function detail(r){
  if(r.type==='sleep'){
    const tag=r.sleep_kind==='nap'?'낮잠':'밤잠';
    if(r.end_time){ return tag+' · '+durLabel(durMin(r.start_time,r.end_time)); }
    return tag+' · 진행 중 ⏱';
  }
  if(r.type==='formula') return (r.ml||0)+'ml';
  if(r.type==='breast'){
    const parts=[];
    if(r.left_min) parts.push('왼쪽 '+r.left_min+'분');
    if(r.right_min) parts.push('오른쪽 '+r.right_min+'분');
    const tot=(r.left_min||0)+(r.right_min||0);
    if(tot) parts.push('총 '+tot+'분');
    return parts.join(' · ')||'모유';
  }
  if(r.type==='diaper') return {urine:'소변',stool:'대변',both:'소변+대변'}[r.diaper_kind]||'기저귀';
  return '';
}

const EMOJI={sleep:'😴',formula:'🍼',breast:'🤱',diaper:'💧'};
const LABEL={sleep:'수면',formula:'분유',breast:'모유',diaper:'기저귀'};

// ── SUPABASE API ──
async function apiGet(path){
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{headers:{...HEADERS,'Prefer':'return=representation'}});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function apiPost(data){
  const res=await fetch(SUPA_URL+'/rest/v1/baby_logs',{method:'POST',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function apiPatch(id, data){
  const res=await fetch(SUPA_URL+'/rest/v1/baby_logs?id=eq.'+id,{method:'PATCH',headers:{...HEADERS,'Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function apiDelete(id){
  const res=await fetch(SUPA_URL+'/rest/v1/baby_logs?id=eq.'+id,{method:'DELETE',headers:HEADERS});
  if(!res.ok) throw new Error(await res.text());
}

// ── LOAD ──
async function loadAll(){
  setSyncState('loading','불러오는 중...');
  try{
    const data = await apiGet('baby_logs?order=start_time.desc&limit=500');
    records = data;
    setSyncState('on','Supabase 연결됨');
    render();
  } catch(e){
    setSyncState('off','연결 실패');
    showToast('데이터 로드 실패: '+e.message);
  }
  document.getElementById('loading').classList.add('hidden');

// ── REALTIME ──
async function initRealtime(){
  // Supabase Realtime via WebSocket
  const wsUrl = SUPA_URL.replace('https','wss')+'/realtime/v1/websocket?apikey='+SUPA_KEY+'&vsn=1.0.0';
  let ws;
  function connect(){
    ws = new WebSocket(wsUrl);
    ws.onopen=()=>{
      ws.send(JSON.stringify({topic:'realtime:public:baby_logs',event:'phx_join',payload:{},ref:'1'}));
      setSyncState('on','실시간 동기화 중');
    };
    ws.onmessage=(e)=>{
      const msg=JSON.parse(e.data);
      if(msg.event==='INSERT'||msg.event==='UPDATE'||msg.event==='DELETE'){
        loadAll(); // 변경 감지 시 전체 새로고침
      }
    };
    ws.onclose=()=>{ setSyncState('off','재연결 중...'); setTimeout(connect,3000); };
    ws.onerror=()=>setSyncState('off','연결 오류');
  }
  connect();
}

function setSyncState(state, txt){
  const dot=document.getElementById('sync-dot');
  dot.className='sync-dot'+(state==='loading'?' loading':state==='off'?' off':'');
  document.getElementById('sync-txt').textContent=txt;
}

async function quickAdd(type, diaperKind){
  const now=new Date();
  const ds=fmtDate(now);
  const iso=now.toISOString();

  // 수면 끝 처리: 진행 중인 수면 카드에 end_time 업데이트
  if(type==='sleep'){
    const ongoing=records.find(r=>r.type==='sleep'&&!r.end_time);
    if(ongoing){
      try{
        await apiPatch(ongoing.id,{end_time:iso});
        showToast('수면 종료 기록됨 · '+durLabel(durMin(ongoing.start_time,iso)));
        await loadAll();
      }catch(e){ showToast('오류: '+e.message); }
      return;
    }
  }

  const rec={type, date:ds, start_time:iso};
  if(type==='sleep') rec.sleep_kind=autoSleepKind(iso);
  if(type==='formula') rec.ml=0;
  if(type==='breast'){ rec.left_min=0; rec.right_min=0; }
  if(type==='diaper') rec.diaper_kind=diaperKind||'urine';

  try{
    await apiPost(rec);
    selDate=now;
    showToast(EMOJI[type]+' '+LABEL[type]+' 기록됨');
    await loadAll();
  }catch(e){ showToast('오류: '+e.message); }
}

// ── VOICE ──
function toggleMic(){
  if(isListening){ stopMic(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('음성인식을 지원하지 않는 브라우저예요.\niOS Safari를 사용해주세요.'); return; }
  recog=new SR();
  recog.lang='ko-KR'; recog.continuous=false; recog.interimResults=false;
  recog.onstart=()=>{
    isListening=true;
    document.getElementById('voice-overlay').classList.remove('hidden');
    document.getElementById('mic-btn').classList.add('on');
    document.getElementById('mic-btn').textContent='🔴 듣는 중...';
  };
  recog.onresult=(e)=>{ const txt=e.results[0][0].transcript; stopMic(); handleVoice(txt); };
  recog.onerror=(e)=>{ if(e.error!=='aborted') stopMic(); };
  recog.onend=()=>stopMic();
  // 이미 캐시된 스트림 있으면 권한 팝업 안 뜸
  recog.start();
}
function stopMic(){ isListening=false; try{recog&&recog.stop();}catch(e){} document.getElementById('voice-overlay').classList.add('hidden'); document.getElementById('mic-btn').classList.remove('on'); document.getElementById('mic-btn').textContent='🎙 음성 입력'; }

async function handleVoice(txt){
  const t=txt.trim();
  const now=new Date();
  const iso=now.toISOString();
  const ds=fmtDate(now);
  const nt=nowTime();

  // 수면 끝
  if(/수면\s*끝|잠\s*깼|기상|일어났/.test(t)){
    const ongoing=records.find(r=>r.type==='sleep'&&!r.end_time);
    if(ongoing){
      await apiPatch(ongoing.id,{end_time:iso});
      showToast('수면 종료 · '+durLabel(durMin(ongoing.start_time,iso)));
      await loadAll(); return;
    } else { showToast('진행 중인 수면 기록이 없어요'); return; }
  }

  // 수면 시작
  if(/수면|잠|낮잠|밤잠|자/.test(t)){
    const sk=/밤잠/.test(t)?'night':autoSleepKind(now);
    await apiPost({type:'sleep', date:ds, start_time:iso, sleep_kind:sk});
    showToast('😴 '+(sk==='nap'?'낮잠':'밤잠')+' 시작');
    await loadAll(); return;
  }

  // 기저귀
  if(/기저귀|소변|대변/.test(t)){
    const kind=/대변/.test(t)&&/소변/.test(t)?'both':/대변/.test(t)?'stool':'urine';
    await apiPost({type:'diaper', date:ds, start_time:iso, diaper_kind:kind});
    showToast('💧 '+{urine:'소변',stool:'대변',both:'소변+대변'}[kind]+' 기록됨');
    await loadAll(); return;
  }

  // 분유 - 바로 저장
  if(/분유/.test(t)){
    const m=t.match(/(\d+)/);
    const ml=m?parseInt(m[1]):0;
    await apiPost({type:'formula', date:ds, start_time:iso, ml});
    showToast('🍼 분유 '+ml+'ml 기록됨');
    await loadAll(); return;
  }

  // 모유 - 바로 저장
  if(/모유|수유/.test(t)){
    const lm=t.match(/왼(쪽)?\s*(\d+)/);
    const rm=t.match(/오른(쪽)?\s*(\d+)/);
    let lMin=lm?parseInt(lm[2]):0;
    let rMin=rm?parseInt(rm[2]):0;
    // "모유 10분" 처럼 방향 없이 숫자만 → 왼쪽으로
    if(!lMin&&!rMin){ const nm=t.match(/(\d+)\s*분?/); if(nm) lMin=parseInt(nm[1]); }
    await apiPost({type:'breast', date:ds, start_time:iso, left_min:lMin, right_min:rMin});
    const parts=[];
    if(lMin) parts.push('왼쪽 '+lMin+'분');
    if(rMin) parts.push('오른쪽 '+rMin+'분');
    showToast('🤱 모유 '+(parts.join(' ')||'기록됨'));
    await loadAll(); return;
  }

  // 방금 입력한거 삭제
  if(/삭제|취소|지워|잘못/.test(t)){
    const last=[...records].sort((a,b)=>b.start_time>a.start_time?1:-1)[0];
    if(last){
      await apiDelete(last.id);
      records=records.filter(r=>r.id!==last.id);
      render();
      showToast('🗑 방금 기록 삭제됨 ('+LABEL[last.type]+')');
    } else { showToast('삭제할 기록이 없어요'); }
    return;
  }

  showToast('"'+txt+'" — 인식 실패');
}

// ── SHAKE TO MIC ──
(function(){
  const THRESHOLD = 18; // 흔들기 감도 (낮을수록 민감)
  const COOLDOWN = 2000; // 연속 감지 방지 (ms)
  let last = {x:0,y:0,z:0};
  let lastFired = 0;

  function onMotion(e){
    const a = e.accelerationIncludingGravity;
    if(!a) return;
    const dx=Math.abs(a.x-last.x), dy=Math.abs(a.y-last.y), dz=Math.abs(a.z-last.z);
    last={x:a.x,y:a.y,z:a.z};
    if(dx+dy+dz > THRESHOLD){
      const now=Date.now();
      if(now-lastFired < COOLDOWN) return;
      lastFired=now;
      if(!isListening) toggleMic();
    }
  }

  // iOS 13+ 는 권한 요청 필요
  if(typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function'){
    // 첫 터치 시 권한 요청 (자동 실행 불가)
    document.addEventListener('touchend', async function ask(){
      try{
        const res = await DeviceMotionEvent.requestPermission();
        if(res === 'granted') window.addEventListener('devicemotion', onMotion);
      }catch(e){}
      document.removeEventListener('touchend', ask);
    }, {once:true});
  } else {
    window.addEventListener('devicemotion', onMotion);
  }
})();

    if(navigator.permissions){
      const perm = await navigator.permissions.query({name:'microphone'});
      if(perm.state === 'granted') return; // 이미 허용됨
    }
    // 아직 허용 안 됐으면 한 번만 요청해서 캐시
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
  } catch(e){ /* 거부해도 음성입력 누를 때 다시 요청됨 */ }
}

loadAll().then(()=>{ initRealtime(); prewarmMic(); });
</script>
</body>
